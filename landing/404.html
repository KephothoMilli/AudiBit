<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | AudiBit</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --bg: #0a0a0f;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 480px;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 28px;
            filter: drop-shadow(0 0 24px rgba(59, 130, 246, 0.4));
        }

        .code {
            font-size: clamp(5rem, 15vw, 8rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: #fff;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="container">
        <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="g404" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#3b82f6" />
                    <stop offset="100%" stop-color="#8b5cf6" />
                </linearGradient>
            </defs>
            <polygon points="32,6 58,56 6,56" fill="url(#g404)" opacity="0.9" />
            <polygon points="32,18 48,48 16,48" fill="rgba(0,0,0,0.3)" />
        </svg>
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Head back home to get started with AudiBit.</p>
        <a class="btn" href="/">← Go Home</a>
    </div>
</body>

</html>
